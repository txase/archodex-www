site:
  name: Archodex
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: Archodex
    template: '%s — Archodex'
  description:
    'The control plane for AI, protecting all agent and workload traffic across endpoints, sandboxes, and data centers.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Archodex
    type: website
  twitter:
    handle: '@archodexinc'
    site: '@archodexinc'
    cardType: summary

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
